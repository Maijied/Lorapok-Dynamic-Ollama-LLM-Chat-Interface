name: Deploy GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd docs/website
        npm install

    - name: Clean up node_modules for deployment
      run: |
        cd docs/website
        if [ -d "node_modules" ]; then rm -rf node_modules; fi

    - name: Validate HTML
      run: |
        cd docs/website
        python3 -c "
        import re

        file_path = 'index.html'
        with open(file_path, 'r', encoding='utf-8') as f:
            content = f.read()

        if '<title>' not in content or '</title>' not in content:
            print('Warning: {} missing title tag'.format(file_path))

        if 'meta name=\"description\"' not in content:
            print('Warning: {} missing meta description'.format(file_path))

        ids = set(re.findall(r'id=[\"\']([^\"\']+)[\"\']', content))
        for href in re.findall(r'href=[\"\']([^\"\']+)[\"\']', content):
            if href.startswith('#'):
                target = href[1:]
                if target and target not in ids:
                    print('Warning: {} broken anchor link: {}'.format(file_path, href))

        print('✓ {} validation completed'.format(file_path))
        "

    - name: Check CSS validity
      run: |
        cd docs/website
        python3 -c "
        import re

        file_path = 'styles.css'
        try:
            with open(file_path, 'r', encoding='utf-8') as f:
                content = f.read()

            # Basic CSS validation - check for balanced braces
            brace_count = content.count('{') - content.count('}')
            if brace_count != 0:
                print('Warning: {} unbalanced braces'.format(file_path))

            print('✓ {} validation completed'.format(file_path))

        except Exception as e:
            print('Error validating {}: {}'.format(file_path, e))
        "

    - name: Test JavaScript syntax
      run: |
        cd docs/website
        node -c script.js && echo '✓ script.js syntax is valid'

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/website

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4