name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd docs/website
        npm install

    - name: Validate HTML
      run: |
        cd docs/website
        python3 - <<'PY'
import re

file_path = 'index.html'
with open(file_path, 'r', encoding='utf-8') as f:
    content = f.read()

if '<title>' not in content or '</title>' not in content:
    print(f'Warning: {file_path} missing title tag')

if 'meta name="description"' not in content:
    print(f'Warning: {file_path} missing meta description')

ids = set(re.findall(r'id=["\']([^"\']+)["\']', content))
for href in re.findall(r'href=["\']([^"\']+)["\']', content):
    if href.startswith('#'):
        target = href[1:]
        if target and target not in ids:
            print(f'Warning: {file_path} broken anchor link: {href}')

print(f'✓ {file_path} validation completed')
PY

    - name: Check CSS validity
      run: |
        cd docs/website
        python3 -c "
        import os
        import re

        def validate_css(file_path):
            try:
                with open(file_path, 'r', encoding='utf-8') as f:
                    content = f.read()

                # Basic CSS validation - check for balanced braces
                brace_count = content.count('{') - content.count('}')
                if brace_count != 0:
                    print(f'Warning: {file_path} unbalanced braces')

                # Check for missing semicolons (basic)
                rules = re.findall(r'\{([^}]+)\}', content)
                for rule in rules:
                    declarations = [d.strip() for d in rule.split(';') if d.strip()]
                    for decl in declarations:
                        if ':' not in decl:
                            print(f'Warning: {file_path} invalid CSS declaration: {decl}')

                print(f'✓ {file_path} validation completed')

            except Exception as e:
                print(f'Error validating {file_path}: {e}')

        validate_css('styles.css')
        "

    - name: Test JavaScript syntax
      run: |
        cd docs/website
        node -c script.js && echo '✓ script.js syntax is valid'

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/website

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4